<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>63 Регион | Кузовной ремонт</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg-black: #0c0c0e; 
            --card-bg: #16161c; 
            --primary-red: #e30613; 
            --text-white: #ffffff; 
            --text-gray: #9ca3af; 
            --border-color: #2a2a35; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-black); color: var(--text-white); padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
        h1 { color: var(--primary-red); font-size: 28px; }

        .ai-section { background: var(--card-bg); border: 1px solid var(--border-color); padding: 25px; border-radius: 12px; margin-bottom: 30px; }
        .upload-area { border: 2px dashed var(--border-color); padding: 30px; text-align: center; cursor: pointer; border-radius: 10px; transition: 0.3s; }
        .upload-area:hover { border-color: var(--primary-red); }
        #fileInput { display: none; }
        #previewImage { max-width: 100%; margin-top: 15px; display: none; border-radius: 8px; }
        
        .result-box { margin-top: 20px; padding: 20px; background: rgba(227, 6, 19, 0.1); border: 1px solid var(--primary-red); border-radius: 8px; display: none; }
        
        .price-section { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border-color); }
        
        .btn-main { background-color: var(--primary-red); color: white; padding: 15px; border: none; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>63 РЕГИОН</h1>
        <p>Кузовной ремонт в Самаре</p>
    </header>

    <div class="ai-section">
        <h3>ИИ Оценка повреждений (Gemini)</h3>
        <p style="color: var(--text-gray); font-size: 14px; margin-bottom: 15px;">Загрузите фото повреждения.</p>
        
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <i class="fa-solid fa-cloud-arrow-up" style="font-size: 40px; color: var(--primary-red);"></i>
            <p>Выбрать фото</p>
            <input type="file" id="fileInput" accept="image/*" onchange="handleFileUpload(this)">
            <img id="previewImage" alt="Preview">
        </div>
        
        <div id="status" style="margin-top: 15px; color: var(--primary-red); text-align: center;"></div>
        
        <div class="result-box" id="resultBox">
            <h4 id="workName"></h4>
            <p id="priceText" style="font-size: 22px; font-weight: bold; margin: 10px 0;"></p>
        </div>
    </div>

    <div class="price-section">
        <h3>Базовый прайс-лист</h3>
        <table>
            <tr><th>Услуга</th><th>Цена от</th></tr>
            <tr><td>Покраска бампера</td><td>10 000 ₽</td></tr>
            <tr><td>Покраска крыла</td><td>9 000 ₽</td></tr>
            <tr><td>Рихтовка (PDR)</td><td>2 500 ₽</td></tr>
            <tr><td>Стапель</td><td>15 000 ₽</td></tr>
        </table>
        <button class="btn-main" onclick="alert('Заявка принята!')">ЗАПИСАТЬСЯ НА ОСМОТР</button>
    </div>
</div>

<script>
    // ВСТАВЬТЕ СЮДА ВАШ БЕСПЛАТНЫЙ КЛЮЧ ОТ GOOGLE AI STUDIO
    const GEMINI_API_KEY = "AIzaSyDlLybcPzM_l4fPvybUHcfMDNA9BY5-CyI"; 

    async function handleFileUpload(input) {
        const file = input.files[0];
        if (!file) return;

        const status = document.getElementById('status');
        const resultBox = document.getElementById('resultBox');
        resultBox.style.display = 'none';
        
        if (GEMINI_API_KEY === "ВСТАВЬТЕ_ВАШ_КЛЮЧ_ЗДЕСЬ") {
            status.innerText = "Ошибка: Укажите API ключ в коде!";
            return;
        }

        status.innerText = "Анализ через Google Gemini...";
        
        try {
            const base64 = await resizeAndCompressImage(file);
            const base64Data = base64.split(',')[1];

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: "Ты эксперт автосервиса в Самаре. Оцени повреждение на фото. Верни ответ СТРОГО в формате JSON: { \"work\": \"название\", \"price\": \"цена в рублях\" }. Если повреждений нет, напиши \"Повреждений не обнаружено\"." },
                            { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                        ]
                    }]
                })
            });

            const data = await response.json();
            
            if (!response.ok) throw new Error(data.error?.message || "Ошибка API");

            // Gemini иногда возвращает текст внутри блоков Markdown, очистим его
            let jsonText = data.candidates[0].content.parts[0].text;
            jsonText = jsonText.replace(/```json/g, "").replace(/```/g, "").trim();
            
            const result = JSON.parse(jsonText);
            status.innerText = "Готово!";
            resultBox.style.display = 'block';
            document.getElementById('workName').innerText = "Результат: " + result.work;
            document.getElementById('priceText').innerText = result.price;

        } catch (err) {
            status.innerText = "Ошибка: " + err.message;
            console.error("Детали:", err);
        }
    }

    function resizeAndCompressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    document.getElementById('previewImage').src = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('previewImage').style.display = 'block';
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
                img.src = event.target.result;
            };
        });
    }
</script>
</body>
</html>
