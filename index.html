<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>63 Регион | Кузовной ремонт</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg-black: #0c0c0e; 
            --card-bg: #16161c; 
            --primary-red: #e30613; 
            --text-white: #ffffff; 
            --text-gray: #9ca3af; 
            --border-color: #2a2a35; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-black); color: var(--text-white); padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* Header */
        header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
        h1 { color: var(--primary-red); font-size: 28px; }

        /* AI Section */
        .ai-section { background: var(--card-bg); border: 1px solid var(--border-color); padding: 25px; border-radius: 12px; margin-bottom: 30px; }
        .upload-area { border: 2px dashed var(--border-color); padding: 30px; text-align: center; cursor: pointer; border-radius: 10px; transition: 0.3s; }
        .upload-area:hover { border-color: var(--primary-red); }
        #fileInput { display: none; }
        #previewImage { max-width: 100%; margin-top: 15px; display: none; border-radius: 8px; }
        
        /* Result */
        .result-box { margin-top: 20px; padding: 20px; background: rgba(227, 6, 19, 0.1); border: 1px solid var(--primary-red); border-radius: 8px; display: none; }
        
        /* Price List Section */
        .price-section { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border-color); }
        
        .btn-main { background-color: var(--primary-red); color: white; padding: 15px; border: none; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>63 РЕГИОН</h1>
        <p>Кузовной ремонт в Самаре</p>
    </header>

    <!-- AI Оценка -->
    <div class="ai-section">
        <h3>ИИ Оценка повреждений</h3>
        <p style="color: var(--text-gray); font-size: 14px; margin-bottom: 15px;">Загрузите фото, чтобы получить предварительный расчет стоимости.</p>
        
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <i class="fa-solid fa-cloud-arrow-up" style="font-size: 40px; color: var(--primary-red);"></i>
            <p>Нажмите для выбора фото</p>
            <input type="file" id="fileInput" accept="image/*" onchange="handleFileUpload(this)">
            <img id="previewImage" alt="Preview">
        </div>
        
        <div id="status" style="margin-top: 15px; color: var(--primary-red); text-align: center;"></div>
        
        <div class="result-box" id="resultBox">
            <h4 id="workName"></h4>
            <p id="priceText" style="font-size: 22px; font-weight: bold; margin: 10px 0;"></p>
        </div>
    </div>

    <!-- Прайс-лист -->
    <div class="price-section">
        <h3>Базовый прайс-лист</h3>
        <table>
            <tr><th>Услуга</th><th>Цена от</th></tr>
            <tr><td>Покраска бампера</td><td>10 000 ₽</td></tr>
            <tr><td>Покраска крыла</td><td>9 000 ₽</td></tr>
            <tr><td>Рихтовка (PDR)</td><td>2 500 ₽</td></tr>
            <tr><td>Стапель</td><td>15 000 ₽</td></tr>
        </table>
        <button class="btn-main" onclick="alert('Переход к записи...')">ЗАПИСАТЬСЯ НА ОСМОТР</button>
    </div>
</div>

<script>
    // --- НАСТРОЙКИ ---
    // !!! Вставьте ваш реальный ключ OpenAI здесь !!!
    const OPENAI_API_KEY = "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"; 

    async function handleFileUpload(input) {
        const file = input.files[0];
        const status = document.getElementById('status');
        const resultBox = document.getElementById('resultBox');
        
        // Показ превью
        const reader = new FileReader();
        reader.onload = (e) => { 
            document.getElementById('previewImage').src = e.target.result; 
            document.getElementById('previewImage').style.display = 'block'; 
        };
        reader.readAsDataURL(file);

        status.innerText = "Анализируем фото, подождите...";
        
        // Кодируем фото в Base64
        const base64 = await toBase64(file);

        try {
            const response = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${OPENAI_API_KEY}`
                },
                body: JSON.stringify({
                    model: "gpt-4o",
                    messages: [{
                        role: "user",
                        content: [
                            { type: "text", text: "Ты — эксперт автосервиса '63 Регион' в Самаре. Посмотри на фото. Оцени повреждение кузова. Верни ответ ТОЛЬКО в формате JSON: { 'work': 'название работы', 'price': 'примерная цена в рублях' }. Если повреждений нет, напиши это." },
                            { type: "image_url", image_url: { url: base64 } }
                        ]
                    }],
                    response_format: { type: "json_object" }
                })
            });

            const data = await response.json();
            const result = JSON.parse(data.choices[0].message.content);
            
            status.innerText = "Готово!";
            resultBox.style.display = 'block';
            document.getElementById('workName').innerText = "Результат: " + result.work;
            document.getElementById('priceText').innerText = result.price;

        } catch (err) {
            status.innerText = "Ошибка: не удалось связаться с ИИ. Проверьте API ключ.";
            console.error(err);
        }
    }

    function toBase64(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
        });
    }
</script>
</body>
</html>
