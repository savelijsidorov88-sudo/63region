<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>63 Регион | ИИ Оценка</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-black: #0c0c0e; --primary-red: #e30613; --text-white: #ffffff; }
        body { background-color: var(--bg-black); color: var(--text-white); font-family: sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; text-align: center; }
        .upload-box { border: 2px dashed #444; padding: 40px; border-radius: 12px; cursor: pointer; margin: 20px 0; }
        #preview { max-width: 100%; margin-top: 15px; border-radius: 8px; display: none; }
        .result { background: #1a1a1a; padding: 20px; border-radius: 10px; margin-top: 20px; display: none; border: 1px solid var(--primary-red); }
    </style>
</head>
<body>
    <div class="container">
        <h1>63 РЕГИОН</h1>
        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            <i class="fa-solid fa-camera" style="font-size: 30px; color: var(--primary-red);"></i>
            <p>Нажмите для загрузки фото</p>
            <input type="file" id="fileInput" hidden accept="image/*" onchange="processImage(this)">
            <img id="preview">
        </div>
        <div id="status"></div>
        <div class="result" id="resultBox">
            <h3 id="aiWork"></h3>
            <p id="aiPrice" style="font-size: 20px; color: var(--primary-red);"></p>
        </div>
    </div>

    <script>
        // 1. ВСТАВЬТЕ ВАШ API КЛЮЧ ИЗ GOOGLE AI STUDIO СЮДА
        const API_KEY = "AIzaSyDlLybcPzM_l4fPvybUHcfMDNA9BY5-CyI";
        const MODEL = "gemini-1.5-flash";

        async function processImage(input) {
            const file = input.files[0];
            const status = document.getElementById('status');
            const resultBox = document.getElementById('resultBox');
            
            if (!file) return;

            // Показ превью
            const reader = new FileReader();
            reader.onload = (e) => { 
                const img = document.getElementById('preview');
                img.src = e.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(file);

            status.innerText = "Анализирую фото...";
            
            const base64Data = await toBase64(file);

            try {
                // Прямой запрос к API Gemini
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Ты эксперт автосервиса. Оцени повреждение на фото. Верни ответ строго в JSON: { \"work\": \"Название работы\", \"price\": \"Цена в рублях\" }. Если повреждений нет, напиши JSON с work: 'Повреждений не обнаружено'." },
                                { inline_data: { mime_type: "image/jpeg", data: base64Data.split(',')[1] } }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const cleanText = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "");
                    const result = JSON.parse(cleanText);
                    
                    document.getElementById('aiWork').innerText = result.work;
                    document.getElementById('aiPrice').innerText = result.price;
                    resultBox.style.display = 'block';
                    status.innerText = "";
                } else {
                    throw new Error("Не удалось получить ответ от ИИ");
                }
            } catch (err) {
                status.innerText = "Ошибка: " + err.message;
            }
        }

        function toBase64(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
            });
        }
    </script>
</body>
</html>
